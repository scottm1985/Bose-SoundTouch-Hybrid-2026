name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Set up QEMU for ARM emulation (Raspberry Pi support)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Set up Docker Buildx for multi-architecture builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. ADDED: Smart Metadata Extraction
      # This safely handles tags! 
      # - Pushing to 'main' creates tag: edge
      # - Pushing tag 'v4' creates tags: v4 AND latest
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tjgigs/bose-soundtouch-hybrid-2026
          tags: |
            type=edge,branch=main
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Fixes NAS 'manifest unknown' errors
          provenance: false 
          # Builds for PC/NAS, Raspberry Pi (64-bit), and older Pi (32-bit)
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          # Uses the smart tags generated by the metadata action above
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}